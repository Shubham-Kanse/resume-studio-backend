# ─────────────────────────────────────────────────────────────────────────────
# BASE CONFIG 
# ─────────────────────────────────────────────────────────────────────────────

# ── Jasypt encryption config ─────────────────────────────────────────────────
# Algorithm: AES-256 GCM (authenticated encryption, no padding oracle attacks)
jasypt.encryptor.algorithm=PBEWITHHMACSHA512ANDAES_256
jasypt.encryptor.iv-generator-classname=org.jasypt.iv.RandomIvGenerator
jasypt.encryptor.salt-generator-classname=org.jasypt.salt.RandomSaltGenerator
# Key is NEVER stored here — supplied at runtime via JASYPT_ENCRYPTOR_PASSWORD

# ── AI / LLM ─────────────────────────────────────────────────────────────────
ai.api.url=https://api.groq.com/openai/v1/chat/completions
# moonshotai/kimi-k2-instruct: 1T param MoE, state-of-the-art for structured reasoning
# Falls back to llama-3.3-70b-versatile if kimi is unavailable
ai.api.model=llama-3.3-70b-versatile

# ── Supabase storage (non-secret defaults) ───────────────────────────────────
supabase.storage.bucket=resumes

# ── Spring datasource (driver only — URL/credentials in profile files) ───────
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Server ───────────────────────────────────────────────────────────────────
# Render (and most PaaS) injects PORT; fall back to 8080 for local
server.port=${PORT:8080}

# ── Multipart ────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
# /generate accepts up to 3 resumes (3 × 5MB) + JD text
spring.servlet.multipart.max-request-size=16MB

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ── HikariCP connection pool (P5) ─────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ── Reviewer tuning ──────────────────────────────────────────────────────────
reviewer.skills.semantic.threshold=0.82
reviewer.jd.unstructured.must-have-ratio=0.7
reviewer.jd.unstructured.min-skills-for-split=8
reviewer.ingest.min-text-length=100
reviewer.ingest.parse-confidence-threshold=0.3
reviewer.tesseract.psm=6

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.resumestudio.reviewer.skills.SkillMatchEngine=INFO
logging.level.com.resumestudio.reviewer.ReviewCache=INFO
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR

# ── Billing / Stripe (set via environment variables in production) ────────────
# stripe.secret-key=sk_live_xxxxx  (set via STRIPE_SECRET_KEY env var)
# stripe.price.basic=price_xxxxx   (set via STRIPE_PRICE_BASIC env var)
# stripe.price.pro=price_xxxxx     (set via STRIPE_PRICE_PRO env var)
# stripe.webhook-secret=whsec_xxxx (set via STRIPE_WEBHOOK_SECRET env var)
app.base-url=http://localhost:3000
