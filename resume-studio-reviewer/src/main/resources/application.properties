reviewer.skills.semantic.threshold=0.82
reviewer.jd.unstructured.must-have-ratio=0.7
reviewer.jd.unstructured.min-skills-for-split=8
reviewer.ingest.min-text-length=100
reviewer.ingest.parse-confidence-threshold=0.3
reviewer.tesseract.psm=6

logging.level.com.resumestudio.reviewer.skills.SkillMatchEngine=INFO
logging.level.com.resumestudio.reviewer.signals.FormatSignalCalculator=INFO

ai.api.url=https://api.groq.com/openai/v1/chat/completions
ai.api.model=moonshotai/kimi-k2-instruct

supabase.url=${SUPABASE_URL}
supabase.storage.endpoint=${SUPABASE_STORAGE_ENDPOINT}
supabase.storage.region=${SUPABASE_STORAGE_REGION:eu-central-1}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:resumes}

app.cors.allowed-origins=http://localhost:3000

spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR
