# Test datasource — in-memory H2, no real DB needed for integration tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
redis.url=
ai.api.key=test-key
ai.api.url=https://api.groq.com/openai/v1/chat/completions
ai.api.model=moonshotai/kimi-k2-instruct
supabase.url=https://dniptbjiqglpbpkttwrb.supabase.co
# Dummy storage values — S3Client is constructed lazily, no actual connection made during tests
supabase.storage.endpoint=https://example.supabase.co/storage/v1/s3
supabase.storage.region=eu-central-1
supabase.storage.bucket=test-bucket
supabase.storage.access-key=test-access-key
supabase.storage.secret-key=test-secret-key
